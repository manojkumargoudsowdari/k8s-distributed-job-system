apiVersion: v1
kind: Service
metadata:
  name: job-system-postgres
  namespace: default
  labels:
    app: job-system-postgres
spec:
  selector:
    app: job-system-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-system-postgres
  namespace: default
  labels:
    app: job-system-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-system-postgres
  template:
    metadata:
      labels:
        app: job-system-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: jobs
            - name: POSTGRES_USER
              value: jobs
            - name: POSTGRES_PASSWORD
              value: jobs
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
