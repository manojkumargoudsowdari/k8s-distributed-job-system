apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-system-scheduler
  namespace: default
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
