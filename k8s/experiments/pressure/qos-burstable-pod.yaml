apiVersion: v1
kind: Pod
metadata:
  name: qos-burstable
  namespace: default
  labels:
    app: qos-burstable
spec:
  containers:
    - name: stress
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "400M", "--vm-hang", "1"]
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
