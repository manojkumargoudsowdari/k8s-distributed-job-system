apiVersion: v1
kind: Pod
metadata:
  name: node-affinity-test
  namespace: default
  labels:
    app: node-affinity-test
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - default
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
