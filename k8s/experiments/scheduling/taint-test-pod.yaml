apiVersion: v1
kind: Pod
metadata:
  name: taint-test
  namespace: default
  labels:
    app: taint-test
spec:
  tolerations:
    - key: "gpu"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
