apiVersion: v1
kind: Pod
metadata:
  name: qos-pressure
  namespace: default
  labels:
    app: qos-pressure
spec:
  containers:
    - name: stress
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "7G", "--vm-hang", "1"]
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1"
          memory: "8Gi"
