apiVersion: v1
kind: Pod
metadata:
  name: qos-guaranteed
  namespace: default
  labels:
    app: qos-guaranteed
spec:
  containers:
    - name: stress
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "240M", "--vm-hang", "1"]
      resources:
        requests:
          cpu: "200m"
          memory: "300Mi"
        limits:
          cpu: "200m"
          memory: "300Mi"
