name: Bug Report
description: Report a functional or operational defect.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Exact commands or API calls to reproduce.
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs Actual
      description: Describe expected behavior and observed behavior.
    validations:
      required: true

  - type: textarea
    id: logs_evidence
    attributes:
      label: Logs / Evidence
      description: Link or paste relevant evidence files and logs.
